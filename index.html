<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Система уведомлений 2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" id="my-manifest">
</head>
<body class="bg-black text-white min-h-screen flex flex-col items-center justify-center p-6 text-center">

    <div class="bg-zinc-900 p-8 rounded-[3rem] w-full max-w-sm border border-zinc-800 shadow-2xl">
        <div class="text-5xl mb-6">🔥</div>
        <h1 class="text-2xl font-black mb-4">БРУТФОРС УВЕДОМЛЕНИЙ</h1>
        
        <p class="text-zinc-400 text-sm mb-8 leading-relaxed">
            Если после нажатия кнопки ничего не происходит — проверь статус <b>HTTPS</b> и разрешение в настройках Chrome.
        </p>

        <div class="space-y-4">
            <button id="btn-start" class="w-full bg-blue-600 py-5 rounded-3xl font-bold active:scale-95 transition-all shadow-lg shadow-blue-900/40">
                1. ВКЛЮЧИТЬ СПАМ
            </button>
            <button id="btn-install" class="hidden w-full bg-white text-black py-5 rounded-3xl font-bold active:scale-95 transition-all">
                2. УСТАНОВИТЬ (PWA)
            </button>
        </div>

        <div id="status" class="mt-8 text-[10px] font-mono text-zinc-600 bg-black/50 p-4 rounded-2xl text-left h-24 overflow-y-auto">
            > Ожидание команды...
        </div>
    </div>

    <script>
        const btnStart = document.getElementById('btn-start');
        const btnInstall = document.getElementById('btn-install');
        const statusEl = document.getElementById('status');
        let deferredPrompt;

        // Создаем манифест "на лету"
        const manifest = {
            "name": "SpamNotify",
            "short_name": "Spam",
            "start_url": window.location.href,
            "display": "standalone",
            "icons": [{"src": "https://cdn-icons-png.flaticon.com/512/3119/3119338.png", "sizes": "512x512", "type": "image/png"}]
        };
        document.getElementById('my-manifest').setAttribute('href', URL.createObjectURL(new Blob([JSON.stringify(manifest)], {type: 'application/json'})));

        function log(msg) {
            statusEl.innerHTML = `> ${msg}<br>` + statusEl.innerHTML;
        }

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            btnInstall.classList.remove('hidden');
        });

        btnInstall.addEventListener('click', () => {
            if (deferredPrompt) deferredPrompt.prompt();
        });

        async function init() {
            // 1. Проверка HTTPS
            if (location.protocol !== 'https:' && location.hostname !== 'localhost') {
                log("ОШИБКА: Только HTTPS!");
                return;
            }

            // 2. Регистрация Service Worker
            if ('serviceWorker' in navigator) {
                try {
                    const swCode = `
                        self.addEventListener('install', e => self.skipWaiting());
                        self.addEventListener('activate', e => e.waitUntil(clients.claim()));

                        // Фоновый цикл
                        setInterval(() => {
                            self.registration.showNotification('ЗАЙДИ НА САЙТ!', {
                                body: 'Это уведомление из фона (каждые 5 сек)',
                                icon: 'https://cdn-icons-png.flaticon.com/512/3119/3119338.png',
                                tag: 'spam-tag',
                                renotify: true,
                                vibrate: [500, 100, 500]
                            });
                        }, 5000);
                    `;
                    const blob = new Blob([swCode], {type: 'application/javascript'});
                    const reg = await navigator.serviceWorker.register(URL.createObjectURL(blob));
                    log("Service Worker: OK");

                    btnStart.addEventListener('click', async () => {
                        const permission = await Notification.requestPermission();
                        if (permission === 'granted') {
                            log("Доступ получен!");
                            btnStart.textContent = "ЗАПУЩЕНО";
                            btnStart.className = "w-full bg-zinc-800 text-zinc-500 py-5 rounded-3xl font-bold cursor-not-allowed";
                            
                            // Отправка первого уведомления
                            reg.showNotification('ПОЕХАЛИ!', { body: 'Теперь уведомления будут идти в фоне.' });
                        } else {
                            log("ОШИБКА: Нет доступа!");
                        }
                    });

                } catch (err) {
                    log("Ошибка SW: " + err.message);
                }
            }
        }

        init();
    </script>
</body>
    </html>
