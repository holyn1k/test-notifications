<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Напоминатор 7.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .active-glow {
            box-shadow: 0 0 30px rgba(79, 70, 229, 0.6);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen flex items-center justify-center p-6 font-sans">

    <div id="card" class="max-w-sm w-full bg-slate-900 rounded-[2.5rem] p-8 border border-slate-800 text-center transition-all duration-500">
        <div class="text-6xl mb-6">📢</div>
        <h1 class="text-2xl font-black mb-2 text-white">ФОНОВЫЙ ЦИКЛ</h1>
        <p class="text-slate-500 text-xs mb-8">Если уведомлений нет в шторке, проверьте настройки «Всплывающие уведомления» в параметрах Chrome.</p>

        <div id="console" class="mb-6 p-4 bg-black/50 rounded-2xl text-[10px] font-mono text-left text-indigo-400 h-32 overflow-y-auto border border-indigo-500/10">
            > Система готова к запуску...
        </div>

        <button id="main-btn" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-5 rounded-3xl active:scale-95 transition-all shadow-xl">
            ВКЛЮЧИТЬ (5 СЕК)
        </button>

        <div class="mt-8 text-[10px] text-slate-600 space-y-2 uppercase font-bold tracking-widest">
            <p id="battery-status">🔋 Проверьте режим экономии</p>
            <p id="perm-status">🔒 Разрешение не получено</p>
        </div>
    </div>

    <!-- Тихий звук для поддержания жизни процесса -->
    <audio id="silent-audio" loop>
        <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" type="audio/ogg">
    </audio>

    <script>
        const btn = document.getElementById('main-btn');
        const consoleEl = document.getElementById('console');
        const card = document.getElementById('card');
        const silentAudio = document.getElementById('silent-audio');
        const permStatus = document.getElementById('perm-status');

        function log(msg) {
            const time = new Date().toLocaleTimeString();
            consoleEl.innerHTML = `[${time}] ${msg}<br>` + consoleEl.innerHTML;
        }

        async function triggerNotification() {
            const options = {
                body: "Пора вернуться! Прошло 5 секунд.",
                icon: "https://cdn-icons-png.flaticon.com/512/3119/3119338.png",
                badge: "https://cdn-icons-png.flaticon.com/512/3119/3119338.png",
                tag: "force-recall",
                renotify: true,
                vibrate: [200, 100, 200],
                silent: false,
                requireInteraction: true
            };

            try {
                // Прямое создание уведомления
                new Notification("ВНИМАНИЕ!", options);
                log("Сигнал отправлен");
                
                if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
            } catch (e) {
                log("Ошибка: " + e.message);
            }
        }

        btn.addEventListener('click', async () => {
            log("Запрос разрешения...");
            const permission = await Notification.requestPermission();
            
            if (permission === 'granted') {
                log("Доступ получен! Старт...");
                permStatus.textContent = "🔒 ДОСТУП РАЗРЕШЕН";
                permStatus.className = "text-emerald-500";
                
                card.classList.add('active-glow', 'border-indigo-500/50');
                btn.disabled = true;
                btn.textContent = "РАБОТАЕТ В ФОНЕ";
                btn.className = "w-full bg-slate-800 text-slate-500 font-bold py-5 rounded-3xl cursor-not-allowed";

                // Запускаем тихий звук, чтобы Android не убил процесс
                silentAudio.volume = 0.01;
                silentAudio.play().catch(e => log("Звук заблокирован (нужен клик)"));

                // Запуск интервала
                setInterval(() => {
                    triggerNotification();
                }, 5000);

                log("СВЕРНИТЕ БРАУЗЕР (кнопка Домой)");
            } else {
                log("ОШИБКА: Доступ отклонен!");
                permStatus.textContent = "🔒 ДОСТУП ЗАБЛОКИРОВАН";
                permStatus.className = "text-red-500";
            }
        });
    </script>
</body>
</html>
