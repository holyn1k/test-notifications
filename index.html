<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Напоминатор 9.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen flex items-center justify-center p-6 font-sans text-center">

    <div class="max-w-sm w-full bg-slate-900 rounded-[3rem] p-10 border border-slate-800 shadow-2xl relative overflow-hidden">
        <div class="relative z-10">
            <div class="text-6xl mb-6">🚀</div>
            <h1 class="text-3xl font-black mb-4">БЕЗ ОШИБОК</h1>
            <p class="text-slate-400 text-sm mb-8">Этот метод работает напрямую через таймер. Просто разреши доступ и сверни браузер.</p>

            <button id="start-btn" class="w-full bg-blue-600 hover:bg-blue-500 py-5 rounded-3xl font-bold shadow-xl active:scale-95 transition-all">
                АКТИВИРОВАТЬ
            </button>
        </div>

        <div id="log" class="mt-8 bg-black/40 p-4 rounded-2xl text-[10px] font-mono text-blue-400 text-left h-24 overflow-y-auto">
            > Готов к работе...
        </div>
    </div>

    <script>
        const btn = document.getElementById('start-btn');
        const logEl = document.getElementById('log');

        function addLog(msg) {
            logEl.innerHTML = `> ${msg}<br>` + logEl.innerHTML;
        }

        // Функция показа уведомления (вызывается через браузер)
        function showNotification() {
            const options = {
                body: "ЗАЙДИ НА САЙТ! Прошло 5 секунд.",
                icon: "https://cdn-icons-png.flaticon.com/512/3119/3119338.png",
                tag: "recall-spam",
                renotify: true,
                vibrate: [200, 100, 200],
                requireInteraction: true
            };

            // Пробуем два метода сразу
            try {
                // Метод 1 (Standard)
                new Notification("ВНИМАНИЕ!", options);
            } catch (e) {
                // Метод 2 (Fallback через регистрацию, если доступна)
                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.ready.then(reg => {
                        reg.showNotification("ВНИМАНИЕ!", options);
                    });
                }
            }
            
            if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
            addLog("Сигнал отправлен");
        }

        btn.addEventListener('click', async () => {
            addLog("Запрос доступа...");
            const permission = await Notification.requestPermission();
            
            if (permission === 'granted') {
                addLog("Доступ получен! Старт...");
                btn.textContent = "РАБОТАЕТ";
                btn.disabled = true;
                btn.className = "w-full bg-slate-800 text-slate-500 py-5 rounded-3xl cursor-not-allowed";

                // Запускаем цикл каждые 5 секунд
                setInterval(showNotification, 5000);
                
                addLog("СВЕРНИТЕ БРАУЗЕР КНОПКОЙ ДОМОЙ");
            } else {
                addLog("ОШИБКА: Доступ отклонен.");
            }
        });
    </script>
</body>
</html>
